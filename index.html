<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <!-- Favicon para la pestaña del navegador -->
    <link rel="icon" type="image/png" href="kodacoin.png">

    <!-- Icono oficial para cuando lo agregás al inicio en el iPhone -->
    <link rel="apple-touch-icon" href="kodacoin.png">

    <!-- Configuración para que se abra a pantalla completa como una App nativa -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KodaCoin">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodaCoin | Mis Gastos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="theme-color" content="#89c4f4">
    
    <style>
        :root { --bg-color: #f0f7ff; --card-bg: #ffffff; --primary: #89c4f4; --primary-dark: #63a4d6; --text-main: #334e68; --text-muted: #627d98; --expense: #ff9e9e; --border-radius: 20px; }
        
        /* Estilo de letras clásico y limpio del sistema */
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--text-main); }
        
        .app-container { width: 100%; max-width: 480px; }
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: none; }
        .summary-card { text-align: center; border: 2px solid var(--primary); }
        .balance-amount { font-size: 32px; font-weight: 800; color: var(--primary-dark); }
        
        /* Ajuste de font-size a 16px para evitar el zoom automático en iOS */
        input, select { width: 100%; padding: 14px; border: 2px solid #e1ecf4; border-radius: 20px; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; font-weight: 600; font-size: 16px; }
        
        button.btn-submit { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        button.btn-submit:active { transform: scale(0.98); }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; background: #fafbfc; padding: 15px; border-radius: 20px; margin-bottom: 10px; }
        h1, h2, h3 { font-weight: 700; margin-top: 0; }
        canvas { margin-top: 15px; }
        
        .btn-action { background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px 0 5px 10px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.85); }

        /* Botón de actualizar al lado del filtro */
        .btn-refresh { background: #fafbfc; border: 2px solid #e1ecf4; border-radius: 20px; padding: 0; cursor: pointer; width: 50px; height: 50px; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-sizing: border-box; }
        .btn-refresh:active { transform: scale(0.90); }
    </style>
</head>
<body>
<div class="app-container">
    
    <!-- Contenedor del kodacoin de la App -->
    <div style="text-align: center; margin-top: 10px; margin-bottom: 5px;">
        <img src="kodacoin.png" alt="logo KodaCoin" style="width: 70px; height: auto; border-radius: 50%;">
    </div>
    
    <h1 style="text-align:center; color: var(--primary-dark); margin-top: 5px;">KodaCoin 🐾</h1>
    
    <!-- Filtro y Botón Actualizar juntos -->
    <div class="card" style="display: flex; gap: 10px; align-items: center; padding: 15px 20px;">
        <select id="month-filter" style="margin-bottom: 0; flex: 1;"><option value="all">Ver todo el historial</option></select>
        <button class="btn-refresh" id="btn-refresh" title="Actualizar datos">🔄</button>
    </div>
    
    <div class="card summary-card">
        <div style="font-size: 12px; color:var(--text-muted); text-transform: uppercase;">Total del periodo</div>
        <div class="balance-amount" id="balance-display">$0</div>
    </div>

    <div class="card" id="form-card">
        <h2 id="form-title">Nuevo Gasto</h2>
        <form id="tx-form">
            <input type="date" id="date" required>
            <input type="text" id="desc" placeholder="Concepto" required>
            <select id="category" required>
                <option value="" disabled selected>Seleccionar categoría</option>
                <option>Verdulería/Carniceria</option><option>Almuerzo oficina</option><option>Casa</option>
                <option>Auto</option><option>Super</option><option>Delivery</option><option>Farmacia</option>
                <option>Gastos varios</option><option>Comer afuera</option><option>Servicios</option>
                <option>Recreacion</option><option>Regalos</option><option>Tarjeta de Credito</option>
                <option>Transporte</option><option>Vacaciones</option><option>Suscripciones</option>
                <option>Gimnasio/Salud</option><option>Panaderia</option><option>Koda</option>
            </select>
            <select id="account" required>
                <option value="" disabled selected>Seleccionar cuenta</option>
                <option>Personal Pay</option><option>Tarjeta de Credito</option><option>Debito</option><option>Efectivo</option><option>MercadoPago</option>
            </select>
            <input type="number" id="amount" placeholder="Monto" required>
            <select id="payer" required>
                <option value="" disabled selected>Quién pagó</option>
                <option>Fran</option><option>Agus</option><option>Compartido</option>
            </select>
            <button type="submit" class="btn-submit" id="submit-button">Guardar Gasto</button>
        </form>
    </div>

    <div class="card" id="analysis-section" style="display:none">
        <h2>Análisis</h2>
        <canvas id="chart-category"></canvas>
        <canvas id="chart-payer"></canvas>
        <canvas id="chart-method"></canvas>
    </div>

    <div class="card">
        <h2>Historial</h2>
        <div id="tx-list">Cargando...</div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF4F9w4HYhOAKaQcLsl2RFKwNvhi3F52x7a3LT9mxaLfhLIOf-1q9DTi-aG8RIvOkVRQ/exec'; 
    let expenses = [], charts = {};
    let editingId = null; 
    const monthFilter = document.getElementById('month-filter');

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('date').valueAsDate = new Date();
        loadData(); // Carga inicial
    });

    document.getElementById('btn-refresh').addEventListener('click', loadData);
    monthFilter.addEventListener('change', updateUI);

    function loadData() {
        const list = document.getElementById('tx-list');
        list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Cargando datos...</p>';
        
        fetch(scriptURL).then(res => res.json()).then(data => {
            expenses = data;
            const currentSelected = monthFilter.value;
            
            monthFilter.innerHTML = '<option value="all">Ver todo el historial</option>';
            const months = [...new Set(expenses.map(tx => tx.date.substring(0, 7)))].sort().reverse();
            months.forEach(m => { 
                const opt = document.createElement('option'); 
                opt.value = m; 
                opt.text = m; 
                monthFilter.appendChild(opt); 
            });
            
            if (months.includes(currentSelected)) {
                monthFilter.value = currentSelected;
            } else {
                const currentMonth = new Date().toISOString().substring(0, 7);
                if (months.includes(currentMonth)) {
                    monthFilter.value = currentMonth;
                }
            }
            
            updateUI();
        }).catch(err => {
            list.innerHTML = '<p style="text-align:center; color:var(--expense); font-weight:700;">Error al conectar con Google Sheets.</p>';
            console.error(err);
        });
    }

    document.getElementById('tx-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const category = document.getElementById('category').value;
        const account = document.getElementById('account').value;
        const amount = document.getElementById('amount').value;
        const payer = document.getElementById('payer').value;

        if (editingId) {
            expenses = expenses.map(tx => tx.id.toString() === editingId.toString() ? { id: editingId, date, desc, category, account, amount, payer } : tx);
            updateUI();
            
            fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'edit', id: editingId, date, desc, category, account, amount, payer }) 
            });
            
            editingId = null;
            document.getElementById('form-title').innerText = "Nuevo Gasto";
            document.getElementById('submit-button').innerText = "Guardar Gasto";
        } else {
            const localId = Date.now().toString();
            const tx = { id: localId, date, desc, category, account, amount, payer };
            
            expenses.push(tx); 
            updateUI();
            fetch(scriptURL, { method: 'POST', body: JSON.stringify(tx) });
        }
        
        this.reset(); 
        document.getElementById('date').valueAsDate = new Date();
    });

    function editExpense(id) {
        const tx = expenses.find(e => e.id.toString() === id.toString());
        if (tx) {
            editingId = id;
            document.getElementById('date').value = tx.date.split('T')[0];
            document.getElementById('desc').value = tx.desc;
            document.getElementById('category').value = tx.category;
            document.getElementById('account').value = tx.account;
            document.getElementById('amount').value = tx.amount;
            document.getElementById('payer').value = tx.payer;
            document.getElementById('form-title').innerText = "Editar Gasto ✏️";
            document.getElementById('submit-button').innerText = "Actualizar Gasto";
            document.getElementById('form-card').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function deleteExpense(id) {
        if (confirm('¿Seguro que querés borrar este gasto?')) {
            expenses = expenses.filter(tx => tx.id.toString() !== id.toString());
            updateUI();
            fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
            if(editingId && editingId.toString() === id.toString()) {
                editingId = null;
                document.getElementById('tx-form').reset();
                document.getElementById('date').valueAsDate = new Date();
                document.getElementById('form-title').innerText = "Nuevo Gasto";
                document.getElementById('submit-button').innerText = "Guardar Gasto";
            }
        }
    }

    function updateUI() {
        const list = document.getElementById('tx-list'), selected = monthFilter.value;
        list.innerHTML = '';
        let total = 0, byCat = {}, byPayer = {}, byMet = {};
        
        const filtered = expenses.filter(tx => selected === 'all' || tx.date.substring(0, 7) === selected);
        
        if (filtered.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No hay gastos en este periodo.</p>';
            document.getElementById('analysis-section').style.display = 'none';
        } else {
            document.getElementById('analysis-section').style.display = 'block';
        }

        filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(tx => {
            total += parseFloat(tx.amount);
            byCat[tx.category] = (byCat[tx.category] || 0) + parseFloat(tx.amount);
            byPayer[tx.payer] = (byPayer[tx.payer] || 0) + parseFloat(tx.amount);
            byMet[tx.account] = (byMet[tx.account] || 0) + parseFloat(tx.amount);
            
            const shortDate = tx.date.split('T')[0];
            list.innerHTML += `
                <div class="transaction-item">
                    <div>
                        <b>${tx.desc}</b><br>
                        <small style="color:var(--text-muted)">${shortDate} • ${tx.category} • ${tx.payer} • ${tx.account}</small>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div style="color:var(--expense); font-weight:700; white-space: nowrap;">
                            -$${Math.round(parseFloat(tx.amount)).toLocaleString('es-AR')}
                        </div>
                        <button class="btn-action" style="color: var(--primary-dark);" onclick="editExpense('${tx.id}')">✏️</button>
                        <button class="btn-action" style="color: var(--expense);" onclick="deleteExpense('${tx.id}')">❌</button>
                    </div>
                </div>`;
        });
        
        document.getElementById('balance-display').innerText = `$${Math.round(total).toLocaleString('es-AR')}`;
        
        if(filtered.length > 0) {
            createChart('chart-category', 'Gastos por Categoría', byCat);
            createChart('chart-payer', 'Gastos por Persona', byPayer);
            createChart('chart-method', 'Gastos por Cuenta', byMet);
        }
    }

    function createChart(id, label, data) {
        if(charts[id]) charts[id].destroy();
        
        const colores = [
            '#89c4f4', '#ff9e9e', '#a3e4d7', '#f7dc6f', '#d2b4de', 
            '#f1948a', '#73c6b6', '#f8c471', '#bb8fce', '#58d68d', 
            '#85c1e9', '#f0b27a', '#aeb6bf', '#f5b041', '#48c9b0', 
            '#af7ac5', '#5dade2', '#ec7063', '#f4d03f', '#a9dfbf'
        ];

        const roundedValues = Object.values(data).map(val => Math.round(val));

        charts[id] = new Chart(document.getElementById(id), {
            type: 'pie',
            data: { 
                labels: Object.keys(data), 
                datasets: [{ 
                    data: roundedValues, 
                    backgroundColor: colores,
                    borderWidth: 2, 
                    borderColor: '#ffffff'
                }] 
            },
            options: { 
                plugins: { 
                    title: { display: true, text: label, font: { family: 'system-ui', size: 16 } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return ` ${context.label}: $${context.raw.toLocaleString('es-AR')}`;
                            }
                        }
                    }
                } 
            }
        });
    }
</script>
</body>
</html>
