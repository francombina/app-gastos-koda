<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodaCoin | Mis Gastos</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="theme-color" content="#89c4f4">
    <style>
        :root { --bg-color: #f0f7ff; --card-bg: #ffffff; --primary: #89c4f4; --primary-dark: #63a4d6; --text-main: #334e68; --text-muted: #627d98; --expense: #ff9e9e; --border-radius: 20px; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--text-main); }
        .app-container { width: 100%; max-width: 480px; padding-bottom: 80px; }
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e1ecf4; border-radius: 20px; margin-bottom: 12px; box-sizing: border-box; font-family: 'Quicksand', sans-serif; font-size: 16px; }
        button.btn-submit { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }
        .page { display: none; } .active { display: block; }
        .nav-menu { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; background: var(--card-bg); padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-btn { cursor: pointer; color: var(--text-muted); font-weight: 700; border: none; background: none; }
        .nav-btn.active { color: var(--primary-dark); }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; background: #fafbfc; padding: 15px; border-radius: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="app-container">
    <h1 style="text-align:center; color: var(--primary-dark);">KodaCoin 🐾</h1>

    <div id="page-form" class="page active card">
        <h2>Nuevo Gasto</h2>
        <form id="tx-form">
            <input type="date" id="date" required>
            <input type="text" id="desc" placeholder="Concepto" required>
            <select id="category" required><option value="" disabled selected>Categoría</option><option>Verdulería/Carniceria</option><option>Auto</option><option>Super</option><option>Delivery</option><option>Servicios</option><option>Casa</option></select>
            <select id="account" required><option value="" disabled selected>Cuenta</option><option>Personal Pay</option><option>Tarjeta de Credito</option><option>BBVA CA</option><option>Efectivo</option><option>MercadoPago</option></select>
            <input type="number" id="amount" placeholder="Monto" required>
            <select id="payer" required><option value="" disabled selected>Quién pagó</option><option>Fran</option><option>Agus</option><option>Compartido</option></select>
            <button type="submit" class="btn-submit">Guardar Gasto</button>
        </form>
    </div>

    <div id="page-list" class="page card">
        <select id="month-filter"><option value="all">Ver todo el historial</option></select>
        <h2>Historial</h2>
        <div id="tx-list"></div>
    </div>

    <div id="page-analysis" class="page card">
        <h2>Análisis</h2>
        <canvas id="chart-category"></canvas>
        <canvas id="chart-payer"></canvas>
        <canvas id="chart-method"></canvas>
    </div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="showPage('page-form', this)">Nuevo</button>
        <button class="nav-btn" onclick="showPage('page-list', this)">Historial</button>
        <button class="nav-btn" onclick="showPage('page-analysis', this)">Análisis</button>
    </div>
</div>

<script>
    const scriptURL = 'TU_URL_DEL_SCRIPT_AQUÍ'; 
    let expenses = [], charts = {};
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }
    
    document.getElementById('tx-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const tx = { date: document.getElementById('date').value, desc: document.getElementById('desc').value, category: document.getElementById('category').value, account: document.getElementById('account').value, amount: document.getElementById('amount').value, payer: document.getElementById('payer').value };
        fetch(scriptURL, { method: 'POST', body: JSON.stringify(tx) });
        this.reset(); alert("Gasto guardado");
    });
</script>
</body>
</html>
