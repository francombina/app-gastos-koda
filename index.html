<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Gastos</title>
    <style>
        :root {
            --bg-color: #f0f7ff;
            --card-bg: #ffffff;
            --primary: #89c4f4;
            --primary-dark: #63a4d6;
            --text-main: #334e68;
            --text-muted: #627d98;
            --expense: #ff9e9e;
            --border-radius: 24px;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--text-main); }
        .app-container { width: 100%; max-width: 480px; }
        header { margin-bottom: 25px; text-align: center; }
        h1 { margin: 0; font-size: 28px; color: var(--primary-dark); }
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 24px; box-shadow: 0 10px 20px rgba(137, 196, 244, 0.15); margin-bottom: 20px; }
        
        /* Meses (Encabezados) */
        .month-header { font-size: 18px; font-weight: 700; color: var(--primary-dark); margin: 25px 0 10px 5px; border-left: 4px solid var(--primary); padding-left: 10px; }

        .summary-card { text-align: center; border: 2px solid var(--primary); }
        .balance-amount { font-size: 40px; font-weight: 800; color: var(--primary-dark); }

        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1ecf4; border-radius: 16px; box-sizing: border-box; }
        button.btn-submit { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }

        .transaction-item { display: flex; justify-content: space-between; align-items: center; background: #fafbfc; padding: 16px; border-radius: 18px; margin-bottom: 8px; }
        .tx-amount { font-weight: 700; color: var(--expense); }
        .tx-details { font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>Mis Gastos 👋</h1></header>

    <div class="card" style="padding: 10px 24px;">
        <select id="month-filter" style="border: none; font-weight: 700; color: var(--primary-dark); cursor: pointer; background: transparent; width: 100%;">
            <option value="all">Ver todo el historial</option>
        </select>
    </div>

    <div class="card summary-card">
        <div style="color:var(--text-muted); font-size: 14px;">Total del periodo</div>
        <div class="balance-amount" id="balance-display">$0.00</div>
    </div>

    <div class="card">
        <h2>Nuevo Gasto</h2>
        <form id="tx-form">
            <input type="text" id="desc" placeholder="Concepto" required style="margin-bottom:10px;">
            <select id="category" required style="margin-bottom:10px;">
                <option value="Vivienda">Vivienda</option>
                <option value="Supermercado">Supermercado</option>
                <option value="Ocio">Ocio</option>
            </select>
            <input type="number" id="amount" placeholder="Monto" required style="margin-bottom:10px;">
            <input type="date" id="date" required style="margin-bottom:10px;">
            <button type="submit" class="btn-submit">Guardar Gasto</button>
        </form>
    </div>

    <div class="card">
        <h2>Historial</h2>
        <div id="tx-list">Cargando...</div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF4F9w4HYhOAKaQcLsl2RFKwNvhi3F52x7a3LT9mxaLfhLIOf-1q9DTi-aG8RIvOkVRQ/exec'; 
    let expenses = [];
    const monthFilter = document.getElementById('month-filter');

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('date').valueAsDate = new Date();
        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                expenses = data;
                populateMonthFilter();
                updateUI();
            });
    });

    function populateMonthFilter() {
        // Aseguramos que la fecha tenga formato correcto antes de extraer
        const months = [...new Set(expenses.map(tx => tx.date.substring(0, 7)))].sort().reverse();
        months.forEach(m => {
            const option = document.createElement('option');
            option.value = m;
            option.text = m;
            monthFilter.appendChild(option);
        });
    }

    monthFilter.addEventListener('change', updateUI);

    function updateUI() {
        const list = document.getElementById('tx-list');
        list.innerHTML = '';
        let total = 0;
        const selectedMonth = monthFilter.value;
        
        // 1. Filtramos
        const filtered = expenses.filter(tx => selectedMonth === 'all' || tx.date.substring(0, 7) === selectedMonth);
        filtered.forEach(tx => total += parseFloat(tx.amount));
        document.getElementById('balance-display').innerText = `$${total.toLocaleString()}`;

        // 2. Agrupamos por mes para la vista
        // Creamos un objeto donde las llaves son los meses (ej: 2026-07)
        const groups = filtered.reduce((acc, tx) => {
            const month = tx.date.substring(0, 7);
            if (!acc[month]) acc[month] = [];
            acc[month].push(tx);
            return acc;
        }, {});

        // 3. Renderizamos
        Object.keys(groups).sort().reverse().forEach(month => {
            // Solo ponemos el encabezado si estamos en "Ver todo"
            if (selectedMonth === 'all') {
                list.innerHTML += `<div class="month-header">${month}</div>`;
            }
            
            groups[month].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(tx => {
                list.innerHTML += `
                    <div class="transaction-item">
                        <div><b>${tx.desc}</b><br><small>${tx.category} • ${tx.payer}</small></div>
                        <div class="tx-amount">-$${parseFloat(tx.amount).toLocaleString()}</div>
                    </div>`;
            });
        });
    }

    // (Tu función de submit se mantiene igual)
    document.getElementById('tx-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const expense = {
            id: Date.now(),
            date: document.getElementById('date').value,
            desc: document.getElementById('desc').value,
            category: document.getElementById('category').value,
            payer: 'Yo',
            method: 'Efectivo',
            amount: parseFloat(document.getElementById('amount').value)
        };
        expenses.push(expense);
        updateUI();
        fetch(scriptURL, { method: 'POST', body: JSON.stringify(expense) }).catch(err => console.log(err));
        this.reset();
        document.getElementById('date').valueAsDate = new Date();
    });
</script>

</body>
</html>
